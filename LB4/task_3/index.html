<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Простий заголовок</title>
    <style>
        body {
            background-color: #ffffff; 
            text-align: center;         
            padding-top: 50px;
        }
        .line {
            display: inline-block;     
            width: 30%;               
            height: 4px;               
            background-color: black;  
            vertical-align: middle;    
        }
        .title-text {
            display: inline-block;
            padding: 0 15px;           
            font-family: serif;
            font-size: 24px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div>
        <span class="line"></span>
        <span class="title-text">TITLE</span>
        <span class="line"></span>
    </div>
</body>
</html>
