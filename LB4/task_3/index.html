<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Простий заголовок</title>
    <style>
        body {
            background-color: #ffffff;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            display: inline-block;
            font-family: serif;
            font-size: 24px;
            margin: 0;
            font-weight: normal;
        }
        h1::before,
        h1::after {
            content: "";
            display: inline-block;
            width: 300px;
            height: 4px;
            background-color: black;
            vertical-align: middle;
        }
        h1::before {
            margin-right: 15px;
        }
        h1::after {
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <h1>TITLE</h1>
</body>
</html>
